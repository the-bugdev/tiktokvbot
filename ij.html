<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxify | TikTok Auto-Verify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-black text-white min-h-screen p-6 md:p-12">

    <div class="max-w-xl mx-auto">
        <div class="flex items-center justify-between mb-12">
            <div class="flex flex-col">
                <span class="text-xs font-bold tracking-[0.3em] text-zinc-500 uppercase">Fluxify Systems</span>
                <h1 class="text-2xl font-bold tracking-tighter text-white">Verification <span class="text-pink-500">Hub</span></h1>
            </div>
            <div class="h-10 w-10 rounded-full border border-zinc-800 flex items-center justify-center bg-zinc-900">
                <div class="h-2 w-2 rounded-full bg-pink-500 animate-pulse"></div>
            </div>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 rounded-[2.5rem] p-8 mb-8 shadow-2xl relative overflow-hidden">
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-pink-500/10 blur-[60px]"></div>
            
            <div class="relative text-center">
                <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-6">Current Automated Address</p>
                <div id="emailDisplay" class="text-xl md:text-2xl font-bold text-pink-500 tracking-tight mb-6 font-mono">
                    Generating...
                </div>
                <button onclick="copyEmail()" class="bg-white text-black text-xs font-bold px-6 py-3 rounded-full hover:scale-105 active:scale-95 transition-all">
                    COPY FOR TIKTOK
                </button>
            </div>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest">Incoming Transmissions</h2>
            <div class="flex items-center gap-2">
                <div id="loader" class="h-1 w-12 bg-zinc-800 rounded-full overflow-hidden">
                    <div class="h-full bg-pink-500 w-1/3 animate-[loading_1.5s_infinite]"></div>
                </div>
                <span class="text-[10px] text-zinc-500 font-bold uppercase">Syncing</span>
            </div>
        </div>

        <div id="mailList" class="space-y-4">
            <div class="p-16 text-center border border-zinc-900 rounded-[2rem] bg-zinc-900/20">
                <p class="text-zinc-700 text-xs font-bold uppercase tracking-widest">Waiting for TikTok OTP...</p>
            </div>
        </div>
    </div>

    <style>
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
    </style>

    <script>
        // PASTE YOUR KEY HERE
        const MAILSAC_KEY = 'K_uijsc4c6WxluzTjeea3kZomE8BFG0IPr'; 
        let currentEmail = '';

        // AUTOMATION: Immediate Prefix Generation
        window.onload = () => {
            // Generates: tiktok-get-verified- plus 4 random characters
            const randomSuffix = Math.random().toString(36).substring(2, 6);
            currentEmail = `tiktok-get-verified-${randomSuffix}@mailsac.com`;
            
            document.getElementById('emailDisplay').innerText = currentEmail;
            
            // Auto-Start Listening
            fetchMessages();
            setInterval(fetchMessages, 5000); // Check every 5 seconds
        };

        async function fetchMessages() {
            if (!currentEmail) return;
            try {
                // If testing locally, you still need a CORS extension or a hosted URL (Vercel/GitHub)
                const response = await fetch(`https://mailsac.com/api/addresses/${currentEmail}/messages`, {
                    headers: { 'Mailsac-Key': MAILSAC_KEY }
                });
                const messages = await response.json();
                renderList(messages);
            } catch (err) {
                console.log("Syncing...");
            }
        }

        function renderList(messages) {
            const container = document.getElementById('mailList');
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="p-12 text-center border border-zinc-900 rounded-[2rem] bg-zinc-900/10">
                        <p class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest">Ready for verification</p>
                    </div>`;
                return;
            }

            container.innerHTML = messages.map(msg => `
                <div onclick="alert('Subject: ' + '${msg.subject}')" class="bg-zinc-900 border border-zinc-800 p-6 rounded-[1.5rem] hover:border-pink-500/50 transition-all cursor-pointer">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-pink-500 font-bold text-[10px] tracking-widest uppercase">Verified Sender</span>
                        <span class="text-[10px] text-zinc-600 font-mono">${new Date(msg.received).toLocaleTimeString()}</span>
                    </div>
                    <div class="text-white font-bold text-lg leading-tight">${msg.subject || '(No Subject)'}</div>
                </div>
            `).join('');
        }

        function copyEmail() {
            navigator.clipboard.writeText(currentEmail);
            const el = document.getElementById('emailDisplay');
            const originalText = el.innerText;
            el.innerText = "COPIED!";
            setTimeout(() => el.innerText = originalText, 1500);
        }
    </script>
</body>
</html>
