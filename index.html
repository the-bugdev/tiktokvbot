<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Verify - Temporary Email</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        .tiktok-gradient {
            background: linear-gradient(45deg, #EE1D52 0%, #69C9D0 100%);
        }
        .message-card:hover {
            background-color: #f1f5f9;
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #EE1D52;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="tiktok-gradient text-white py-6 shadow-lg">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fab fa-tiktok text-2xl"></i>
                <h1 class="text-2xl font-bold tracking-tight">TikTok Verify Temp Mail</h1>
            </div>
            <div class="text-sm opacity-90">Powered by Mail.tm</div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow">
        <!-- Email Display & Controls -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex-grow">
                    <label class="block text-sm font-medium text-gray-500 mb-1">Your Temporary Email Address</label>
                    <div class="flex items-center gap-2">
                        <div id="email-address" class="text-xl font-semibold text-gray-800 bg-gray-50 px-4 py-2 rounded-lg border border-gray-200 flex-grow break-all">
                            Generating...
                        </div>
                        <button onclick="copyEmail()" class="p-3 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors text-gray-600" title="Copy to clipboard">
                            <i class="far fa-copy"></i>
                        </button>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="createNewEmail()" class="px-6 py-3 bg-black text-white rounded-lg font-medium hover:bg-gray-800 transition-colors flex items-center gap-2">
                        <i class="fas fa-sync-alt" id="refresh-icon"></i> New Email
                    </button>
                </div>
            </div>
            <div id="status-message" class="mt-4 text-sm text-gray-500 flex items-center gap-2">
                <div class="loading-spinner" id="global-spinner"></div>
                <span id="status-text">Initializing...</span>
            </div>
        </div>

        <!-- Inbox Section -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Message List -->
            <div class="lg:col-span-1 bg-white rounded-xl shadow-md overflow-hidden flex flex-col h-[600px]">
                <div class="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                    <h2 class="font-bold text-gray-700 flex items-center gap-2">
                        <i class="fas fa-inbox text-blue-500"></i> Inbox
                    </h2>
                    <span id="message-count" class="bg-blue-100 text-blue-600 text-xs font-bold px-2 py-1 rounded-full">0</span>
                </div>
                <div id="message-list" class="overflow-y-auto flex-grow">
                    <!-- Messages will appear here -->
                    <div class="p-8 text-center text-gray-400">
                        <i class="fas fa-envelope-open text-4xl mb-3 opacity-20"></i>
                        <p>No messages yet. Waiting for verification code...</p>
                    </div>
                </div>
            </div>

            <!-- Message Detail -->
            <div class="lg:col-span-2 bg-white rounded-xl shadow-md overflow-hidden flex flex-col h-[600px]">
                <div class="p-4 border-b border-gray-100 bg-gray-50">
                    <h2 class="font-bold text-gray-700 flex items-center gap-2">
                        <i class="fas fa-envelope-open-text text-pink-500"></i> Message Content
                    </h2>
                </div>
                <div id="message-content" class="overflow-y-auto flex-grow p-6">
                    <div class="h-full flex flex-col items-center justify-center text-gray-400">
                        <i class="fas fa-mouse-pointer text-4xl mb-3 opacity-20"></i>
                        <p>Select a message from the inbox to read</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-100 py-6 mt-12 border-t border-gray-200">
        <div class="container mx-auto px-4 text-center text-gray-500 text-sm">
            &copy; 2026 TikTok Verify. All rights reserved. 
            <br>
            <span class="mt-2 block">For educational purposes only. Uses Mail.tm API.</span>
        </div>
    </footer>

    <script>
        const API_URL = 'https://api.mail.tm';
        let currentAccount = null;
        let token = null;
        let messages = [];
        let pollInterval = null;

        const generateRandomString = (length) => {
            return Math.random().toString(36).substring(2, 2 + length);
        };

        const updateStatus = (text, showSpinner = true) => {
            document.getElementById('status-text').innerText = text;
            document.getElementById('global-spinner').style.display = showSpinner ? 'block' : 'none';
        };

        const copyEmail = () => {
            const email = document.getElementById('email-address').innerText;
            if (email && email !== 'Generating...') {
                navigator.clipboard.writeText(email);
                const originalText = document.getElementById('status-text').innerText;
                updateStatus('Email copied to clipboard!', false);
                setTimeout(() => updateStatus(originalText, true), 2000);
            }
        };

        const createNewEmail = async () => {
            if (pollInterval) clearInterval(pollInterval);
            document.getElementById('message-list').innerHTML = '<div class="p-8 text-center text-gray-400"><i class="fas fa-spinner fa-spin text-2xl mb-3"></i><p>Creating new account...</p></div>';
            document.getElementById('message-content').innerHTML = '<div class="h-full flex flex-col items-center justify-center text-gray-400"><i class="fas fa-mouse-pointer text-4xl mb-3 opacity-20"></i><p>Select a message from the inbox to read</p></div>';
            document.getElementById('message-count').innerText = '0';
            
            try {
                updateStatus('Fetching domains...');
                const domainRes = await fetch(`${API_URL}/domains`);
                const domains = await domainRes.json();
                const domain = domains['hydra:member'][0].domain;

                const username = `tiktok-verify-${generateRandomString(8)}`;
                const password = generateRandomString(12);
                const address = `${username}@${domain}`;

                updateStatus(`Creating account: ${address}...`);
                const accountRes = await fetch(`${API_URL}/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address, password })
                });

                if (!accountRes.ok) throw new Error('Failed to create account');
                currentAccount = await accountRes.json();

                updateStatus('Authenticating...');
                const tokenRes = await fetch(`${API_URL}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address, password })
                });

                if (!tokenRes.ok) throw new Error('Failed to get token');
                const tokenData = await tokenRes.json();
                token = tokenData.token;

                document.getElementById('email-address').innerText = address;
                updateStatus('Account ready! Waiting for messages...', true);
                
                startPolling();
            } catch (error) {
                console.error(error);
                updateStatus('Error: ' + error.message, false);
            }
        };

        const startPolling = () => {
            fetchMessages();
            pollInterval = setInterval(fetchMessages, 5000);
        };

        const fetchMessages = async () => {
            try {
                const res = await fetch(`${API_URL}/messages`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const newMessages = data['hydra:member'];
                
                if (JSON.stringify(newMessages) !== JSON.stringify(messages)) {
                    messages = newMessages;
                    renderMessageList();
                }
            } catch (error) {
                console.error('Error fetching messages:', error);
            }
        };

        const renderMessageList = () => {
            const listContainer = document.getElementById('message-list');
            document.getElementById('message-count').innerText = messages.length;

            if (messages.length === 0) {
                listContainer.innerHTML = '<div class="p-8 text-center text-gray-400"><i class="fas fa-envelope-open text-4xl mb-3 opacity-20"></i><p>No messages yet. Waiting for verification code...</p></div>';
                return;
            }

            listContainer.innerHTML = messages.map(msg => `
                <div onclick="viewMessage('${msg.id}')" class="p-4 border-b border-gray-100 cursor-pointer transition-colors message-card ${msg.seen ? 'opacity-70' : 'bg-blue-50/30'}">
                    <div class="flex justify-between items-start mb-1">
                        <span class="font-bold text-sm text-gray-800 truncate pr-2">${msg.from.name || msg.from.address}</span>
                        <span class="text-[10px] text-gray-400 whitespace-nowrap">${new Date(msg.createdAt).toLocaleTimeString()}</span>
                    </div>
                    <div class="text-xs font-semibold text-gray-600 mb-1 truncate">${msg.subject}</div>
                    <div class="text-xs text-gray-400 truncate">${msg.intro}</div>
                </div>
            `).join('');
        };

        const viewMessage = async (id) => {
            const contentContainer = document.getElementById('message-content');
            contentContainer.innerHTML = '<div class="h-full flex items-center justify-center"><i class="fas fa-spinner fa-spin text-3xl text-pink-500"></i></div>';

            try {
                const res = await fetch(`${API_URL}/messages/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const msg = await res.json();
                
                contentContainer.innerHTML = `
                    <div class="space-y-4">
                        <div class="border-b pb-4">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="text-lg font-bold text-gray-800">${msg.subject}</h3>
                                    <p class="text-sm text-gray-500">From: <span class="font-medium">${msg.from.name}</span> &lt;${msg.from.address}&gt;</p>
                                </div>
                                <div class="text-right">
                                    <span class="text-xs text-gray-400">${new Date(msg.createdAt).toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                        <div class="prose max-w-none text-gray-700">
                            ${msg.html ? msg.html[0] : `<pre class="whitespace-pre-wrap">${msg.text}</pre>`}
                        </div>
                    </div>
                `;

                // Mark as seen locally
                const msgIndex = messages.findIndex(m => m.id === id);
                if (msgIndex > -1) {
                    messages[msgIndex].seen = true;
                    renderMessageList();
                }
            } catch (error) {
                contentContainer.innerHTML = `<div class="p-4 text-red-500 text-center">Failed to load message: ${error.message}</div>`;
            }
        };

        // Initialize on load
        window.onload = createNewEmail;
    </script>
</body>
</html>
