<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxify | TikTok Auto-Verify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.35s ease forwards; }

        /* Modal */
        #modal { display: none; }
        #modal.open { display: flex; }
    </style>
</head>
<body class="bg-black text-white min-h-screen p-6 md:p-12">

    <div class="max-w-xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-12">
            <div class="flex flex-col">
                <span class="text-xs font-bold tracking-[0.3em] text-zinc-500 uppercase">Fluxify Systems</span>
                <h1 class="text-2xl font-bold tracking-tighter text-white">Verification <span class="text-pink-500">Hub</span></h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="resetEmail()" title="Generate new email" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest hover:text-pink-500 transition-colors border border-zinc-800 rounded-full px-3 py-1.5 hover:border-pink-500/50">
                    New Address
                </button>
                <div class="h-10 w-10 rounded-full border border-zinc-800 flex items-center justify-center bg-zinc-900">
                    <div class="h-2 w-2 rounded-full bg-pink-500 animate-pulse"></div>
                </div>
            </div>
        </div>

        <!-- Email Display Card -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-[2.5rem] p-8 mb-8 shadow-2xl relative overflow-hidden">
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-pink-500/10 blur-[60px]"></div>
            <div class="relative text-center">
                <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-6">Current Automated Address</p>
                <div id="emailDisplay" class="text-xl md:text-2xl font-bold text-pink-500 tracking-tight mb-6 font-mono break-all">
                    Generating...
                </div>
                <div class="flex gap-3 justify-center flex-wrap">
                    <button onclick="copyEmail()" class="bg-white text-black text-xs font-bold px-6 py-3 rounded-full hover:scale-105 active:scale-95 transition-all">
                        COPY FOR TIKTOK
                    </button>
                    <button onclick="fetchMessages()" class="bg-zinc-800 text-white text-xs font-bold px-5 py-3 rounded-full hover:scale-105 active:scale-95 transition-all hover:bg-zinc-700">
                        REFRESH NOW
                    </button>
                </div>
            </div>
        </div>

        <!-- Mail List Header -->
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest">Incoming Transmissions</h2>
            <div class="flex items-center gap-2">
                <div id="loader" class="h-1 w-12 bg-zinc-800 rounded-full overflow-hidden">
                    <div class="h-full bg-pink-500 w-1/3 animate-[loading_1.5s_infinite]"></div>
                </div>
                <span class="text-[10px] text-zinc-500 font-bold uppercase">Auto-Sync</span>
            </div>
        </div>

        <!-- Mail List -->
        <div id="mailList" class="space-y-4">
            <div class="p-16 text-center border border-zinc-900 rounded-[2rem] bg-zinc-900/20">
                <p class="text-zinc-700 text-xs font-bold uppercase tracking-widest">Waiting for TikTok OTP...</p>
            </div>
        </div>
    </div>

    <!-- Message Modal -->
    <div id="modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 items-center justify-center p-4 open:flex">
        <div class="bg-zinc-900 border border-zinc-800 rounded-[2rem] max-w-lg w-full max-h-[80vh] overflow-y-auto shadow-2xl relative">
            <div class="sticky top-0 bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex justify-between items-center rounded-t-[2rem]">
                <span class="text-[10px] font-bold text-pink-500 uppercase tracking-widest">Message Content</span>
                <button onclick="closeModal()" class="text-zinc-500 hover:text-white text-xl leading-none transition-colors">&times;</button>
            </div>
            <div class="p-6">
                <div id="modalSubject" class="font-bold text-white text-lg mb-4"></div>
                <div id="modalFrom" class="text-[10px] text-zinc-500 font-mono mb-6"></div>
                <!-- OTP highlight box — shown only if an OTP is detected -->
                <div id="otpBox" class="hidden mb-6 bg-pink-500/10 border border-pink-500/30 rounded-2xl p-5 text-center">
                    <p class="text-[10px] font-bold text-pink-500 uppercase tracking-widest mb-2">OTP Code Detected</p>
                    <p id="otpCode" class="font-mono text-4xl font-bold text-pink-400 tracking-widest"></p>
                    <button onclick="copyOtp()" class="mt-3 bg-pink-500 text-white text-[10px] font-bold px-4 py-2 rounded-full hover:scale-105 active:scale-95 transition-all">COPY OTP</button>
                </div>
                <div id="modalBody" class="text-sm text-zinc-300 leading-relaxed whitespace-pre-wrap break-words"></div>
            </div>
        </div>
    </div>

    <script>
        const MAILSAC_KEY = 'K_uijsc4c6WxluzTjeea3kZomE8BFG0IPr';
        const STORAGE_KEY = 'fluxify_email';
        let currentEmail = '';
        let detectedOtp = '';

        // ── Persistent Email ──────────────────────────────────────────────
        window.onload = () => {
            // Reuse saved email, or generate a fresh one
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                currentEmail = saved;
            } else {
                currentEmail = generateEmail();
                localStorage.setItem(STORAGE_KEY, currentEmail);
            }

            document.getElementById('emailDisplay').innerText = currentEmail;
            fetchMessages();
            setInterval(fetchMessages, 5000);
        };

        function generateEmail() {
            const suffix = Math.random().toString(36).substring(2, 6);
            return `tiktok-get-verified-${suffix}@mailsac.com`;
        }

        function resetEmail() {
            if (!confirm('Generate a brand-new address? The old one will stop being monitored.')) return;
            localStorage.removeItem(STORAGE_KEY);
            currentEmail = generateEmail();
            localStorage.setItem(STORAGE_KEY, currentEmail);
            document.getElementById('emailDisplay').innerText = currentEmail;
            document.getElementById('mailList').innerHTML = `
                <div class="p-16 text-center border border-zinc-900 rounded-[2rem] bg-zinc-900/20">
                    <p class="text-zinc-700 text-xs font-bold uppercase tracking-widest">Waiting for TikTok OTP...</p>
                </div>`;
            fetchMessages();
        }

        // ── Fetch message list ────────────────────────────────────────────
        async function fetchMessages() {
            if (!currentEmail) return;
            try {
                const res = await fetch(
                    `https://mailsac.com/api/addresses/${currentEmail}/messages`,
                    { headers: { 'Mailsac-Key': MAILSAC_KEY } }
                );
                const messages = await res.json();
                renderList(messages);
            } catch (err) {
                console.log('Sync error:', err);
            }
        }

        function renderList(messages) {
            const container = document.getElementById('mailList');
            if (!Array.isArray(messages) || messages.length === 0) {
                container.innerHTML = `
                    <div class="p-12 text-center border border-zinc-900 rounded-[2rem] bg-zinc-900/10">
                        <p class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest">Ready for verification</p>
                    </div>`;
                return;
            }

            container.innerHTML = messages.map(msg => `
                <div onclick="openMessage('${msg._id}')"
                     class="fade-in bg-zinc-900 border border-zinc-800 p-6 rounded-[1.5rem] hover:border-pink-500/50 transition-all cursor-pointer">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-pink-500 font-bold text-[10px] tracking-widest uppercase">
                            ${escapeHtml(msg.from?.[0]?.address || 'Unknown Sender')}
                        </span>
                        <span class="text-[10px] text-zinc-600 font-mono">
                            ${new Date(msg.received).toLocaleTimeString()}
                        </span>
                    </div>
                    <div class="text-white font-bold text-base leading-tight">
                        ${escapeHtml(msg.subject || '(No Subject)')}
                    </div>
                    <p class="text-zinc-600 text-[11px] mt-2">Click to read &amp; view OTP →</p>
                </div>
            `).join('');
        }

        // ── Open full message ─────────────────────────────────────────────
        async function openMessage(messageId) {
            // Show modal immediately with loading state
            document.getElementById('modalSubject').textContent = 'Loading…';
            document.getElementById('modalFrom').textContent = '';
            document.getElementById('modalBody').textContent = '';
            document.getElementById('otpBox').classList.add('hidden');
            document.getElementById('modal').classList.add('open');
            document.getElementById('modal').style.display = 'flex';

            try {
                // Fetch plain-text body
                const res = await fetch(
                    `https://mailsac.com/api/text/${currentEmail}/${messageId}`,
                    { headers: { 'Mailsac-Key': MAILSAC_KEY } }
                );
                const bodyText = await res.text();

                // Fetch metadata for subject/from
                const metaRes = await fetch(
                    `https://mailsac.com/api/addresses/${currentEmail}/messages`,
                    { headers: { 'Mailsac-Key': MAILSAC_KEY } }
                );
                const allMessages = await metaRes.json();
                const meta = allMessages.find(m => m._id === messageId) || {};

                document.getElementById('modalSubject').textContent = meta.subject || '(No Subject)';
                document.getElementById('modalFrom').textContent = 'From: ' + (meta.from?.[0]?.address || 'Unknown');
                document.getElementById('modalBody').textContent = bodyText;

                // Auto-detect OTP (4–8 digit number)
                const otpMatch = bodyText.match(/\b(\d{4,8})\b/);
                if (otpMatch) {
                    detectedOtp = otpMatch[1];
                    document.getElementById('otpCode').textContent = detectedOtp;
                    document.getElementById('otpBox').classList.remove('hidden');
                } else {
                    detectedOtp = '';
                }
            } catch (err) {
                document.getElementById('modalBody').textContent = 'Could not load message body. Please try again.';
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('open');
            document.getElementById('modal').style.display = 'none';
        }

        // Close modal on backdrop click
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ── Clipboard helpers ─────────────────────────────────────────────
        function copyEmail() {
            navigator.clipboard.writeText(currentEmail);
            const el = document.getElementById('emailDisplay');
            const original = el.innerText;
            el.innerText = 'COPIED!';
            setTimeout(() => el.innerText = original, 1500);
        }

        function copyOtp() {
            if (!detectedOtp) return;
            navigator.clipboard.writeText(detectedOtp);
            const btn = document.getElementById('otpBox').querySelector('button');
            btn.textContent = 'COPIED!';
            setTimeout(() => btn.textContent = 'COPY OTP', 1500);
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g,'&amp;')
                .replace(/</g,'&lt;')
                .replace(/>/g,'&gt;')
                .replace(/"/g,'&quot;');
        }
    </script>
</body>
</html>
