<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxify | TikTok Auto-Verify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(236,72,153,0.4); }
            70% { box-shadow: 0 0 0 10px rgba(236,72,153,0); }
            100% { box-shadow: 0 0 0 0 rgba(236,72,153,0); }
        }
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in  { animation: fadeSlide 0.4s ease forwards; }
        .pulse-ring { animation: pulse-ring 1.5s infinite; }
    </style>
</head>
<body class="bg-black text-white min-h-screen p-6 md:p-12">

<div class="max-w-xl mx-auto">

    <!-- Header -->
    <div class="flex items-center justify-between mb-12">
        <div>
            <span class="text-xs font-bold tracking-[0.3em] text-zinc-500 uppercase">Fluxify Systems</span>
            <h1 class="text-2xl font-bold tracking-tighter">Verification <span class="text-pink-500">Hub</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="resetEmail()" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest hover:text-pink-500 border border-zinc-800 rounded-full px-3 py-1.5 hover:border-pink-500/40 transition-all">
                New Address
            </button>
            <div id="statusDot" class="h-10 w-10 rounded-full border border-zinc-800 flex items-center justify-center bg-zinc-900">
                <div class="h-2 w-2 rounded-full bg-zinc-600"></div>
            </div>
        </div>
    </div>

    <!-- Email Card -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-[2.5rem] p-8 mb-4 shadow-2xl relative overflow-hidden">
        <div class="absolute -top-10 -left-10 w-40 h-40 bg-pink-500/10 blur-[80px] pointer-events-none"></div>
        <div class="relative text-center">
            <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-5">Your Temporary Address</p>
            <div id="emailDisplay" class="text-xl md:text-2xl font-bold text-pink-500 tracking-tight mb-6 font-mono break-all">
                Generating...
            </div>
            <button onclick="copyEmail()" class="bg-white text-black text-xs font-bold px-6 py-3 rounded-full hover:scale-105 active:scale-95 transition-all">
                COPY FOR TIKTOK
            </button>
        </div>
    </div>

    <!-- Connection Status -->
    <div id="connStatus" class="text-center text-[10px] font-bold text-zinc-600 uppercase tracking-widest mb-8">
        Connecting...
    </div>

    <!-- Mail List Header -->
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest">Incoming Transmissions</h2>
        <div id="syncBar" class="flex items-center gap-2 opacity-0 transition-opacity duration-500">
            <div class="h-1 w-12 bg-zinc-800 rounded-full overflow-hidden">
                <div class="h-full bg-pink-500 w-1/3 animate-[loading_1.5s_infinite]"></div>
            </div>
            <span class="text-[10px] text-zinc-500 font-bold uppercase">Live</span>
        </div>
    </div>

    <!-- Mail List -->
    <div id="mailList" class="space-y-4">
        <div class="p-16 text-center border border-zinc-900 rounded-[2rem] bg-zinc-900/20">
            <p class="text-zinc-700 text-xs font-bold uppercase tracking-widest">Waiting for TikTok OTP...</p>
        </div>
    </div>
</div>

<!-- Message Modal -->
<div id="modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
    <div class="bg-zinc-900 border border-zinc-800 rounded-[2rem] max-w-lg w-full max-h-[80vh] overflow-y-auto shadow-2xl">
        <div class="sticky top-0 bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex justify-between items-center rounded-t-[2rem]">
            <span class="text-[10px] font-bold text-pink-500 uppercase tracking-widest">Message</span>
            <button onclick="closeModal()" class="text-zinc-400 hover:text-white text-2xl leading-none">&times;</button>
        </div>
        <div class="p-6">
            <div id="modalSubject" class="font-bold text-white text-lg mb-1"></div>
            <div id="modalFrom" class="text-[10px] text-zinc-500 font-mono mb-6"></div>
            <div id="otpBox" class="hidden mb-6 bg-pink-500/10 border border-pink-500/30 rounded-2xl p-5 text-center">
                <p class="text-[10px] font-bold text-pink-500 uppercase tracking-widest mb-2">OTP Code Detected</p>
                <p id="otpCode" class="font-mono text-4xl font-bold text-pink-400 tracking-[0.3em]"></p>
                <button onclick="copyOtp()" class="mt-3 bg-pink-500 text-white text-[10px] font-bold px-5 py-2 rounded-full hover:scale-105 active:scale-95 transition-all">
                    COPY OTP
                </button>
            </div>
            <div id="modalBody" class="text-sm text-zinc-300 leading-relaxed whitespace-pre-wrap break-words"></div>
        </div>
    </div>
</div>

<script>
    const MAILSAC_KEY = 'K_uijsc4c6WxluzTjeea3kZomE8BFG0IPr';
    const STORAGE_KEY = 'fluxify_email_v2';
    const MSG_STORE   = 'fluxify_messages_v2';

    let currentEmail = '';
    let ws           = null;
    let detectedOtp  = '';
    let messages     = [];
    let pollTimer    = null;

    // ── Boot ──────────────────────────────────────────────────────────────
    window.onload = () => {
        currentEmail = localStorage.getItem(STORAGE_KEY) || createEmail();
        localStorage.setItem(STORAGE_KEY, currentEmail);
        document.getElementById('emailDisplay').textContent = currentEmail;

        try { messages = JSON.parse(localStorage.getItem(MSG_STORE) || '[]'); } catch { messages = []; }
        renderList();

        // Try WebSocket first, fall back to polling
        tryWebSocket();
    };

    function createEmail() {
        const s = Math.random().toString(36).substring(2, 7);
        return `tiktok-verify-${s}@mailsac.com`;
    }

    function resetEmail() {
        if (!confirm('Generate a new address? Existing messages will be cleared.')) return;
        if (ws) { ws.onclose = null; ws.close(); ws = null; }
        clearInterval(pollTimer); pollTimer = null;
        messages = [];
        localStorage.removeItem(MSG_STORE);
        currentEmail = createEmail();
        localStorage.setItem(STORAGE_KEY, currentEmail);
        document.getElementById('emailDisplay').textContent = currentEmail;
        renderList();
        tryWebSocket();
    }

    // ── WebSocket ─────────────────────────────────────────────────────────
    function tryWebSocket() {
        setStatus('connecting');
        const url = `wss://mailsac.com/api/addresses/${currentEmail}/messages/stream?mailsac-key=${MAILSAC_KEY}`;
        try {
            ws = new WebSocket(url);
        } catch(e) {
            console.warn('WS init failed, polling:', e);
            startPolling();
            return;
        }

        let wsOk = false;

        ws.onopen = () => {
            wsOk = true;
            setStatus('live');
            console.log('[WS] Connected');
        };

        ws.onmessage = (event) => {
            console.log('[WS] Raw:', event.data);
            try {
                const data = JSON.parse(event.data);
                ingestMessage(data);
            } catch(e) {
                console.warn('[WS] Parse error:', e);
            }
        };

        ws.onerror = () => {
            if (!wsOk) {
                console.log('[WS] Failed to open, switching to polling');
                startPolling();
            }
        };

        ws.onclose = () => {
            console.log('[WS] Closed');
            if (wsOk) {
                setStatus('reconnecting');
                setTimeout(tryWebSocket, 6000);
            }
        };
    }

    function ingestMessage(data) {
        // Normalise across different Mailsac payload shapes
        const id      = data._id || data.id || String(Date.now());
        const subject = data.subject || '(No Subject)';
        const from    = data.from || [{ address: data.from_address || 'TikTok' }];
        const received= data.received || new Date().toISOString();
        const body    = data.text || (data.html ? data.html.replace(/<[^>]+>/g,'') : '') || data.body || '';

        if (messages.find(m => m._id === id)) return; // dedupe

        messages.unshift({ _id: id, subject, from, received, body });
        localStorage.setItem(MSG_STORE, JSON.stringify(messages.slice(0, 50)));
        renderList();
        requestNotification(subject);
    }

    // ── Polling fallback ──────────────────────────────────────────────────
    function startPolling() {
        setStatus('polling');
        if (pollTimer) return;
        poll();
        pollTimer = setInterval(poll, 5000);
    }

    async function poll() {
        try {
            const res = await fetch(
                `https://mailsac.com/api/addresses/${currentEmail}/messages`,
                { headers: { 'Mailsac-Key': MAILSAC_KEY } }
            );
            if (!res.ok) throw new Error(res.status);
            const remote = await res.json();
            let added = false;
            for (const m of remote) {
                if (!messages.find(x => x._id === m._id)) {
                    messages.unshift({
                        _id:      m._id,
                        subject:  m.subject || '(No Subject)',
                        from:     m.from    || [{ address: 'unknown' }],
                        received: m.received,
                        body:     '',
                    });
                    added = true;
                }
            }
            if (added) {
                localStorage.setItem(MSG_STORE, JSON.stringify(messages.slice(0, 50)));
                renderList();
            }
        } catch(err) {
            console.warn('[Poll] error:', err);
        }
    }

    // ── Fetch body on demand ──────────────────────────────────────────────
    async function fetchBody(id) {
        const cached = messages.find(m => m._id === id);
        if (cached?.body) return cached.body;
        try {
            const res = await fetch(
                `https://mailsac.com/api/text/${currentEmail}/${id}`,
                { headers: { 'Mailsac-Key': MAILSAC_KEY } }
            );
            if (!res.ok) throw new Error(res.status);
            const text = await res.text();
            if (cached) { cached.body = text; localStorage.setItem(MSG_STORE, JSON.stringify(messages.slice(0,50))); }
            return text;
        } catch { return null; }
    }

    // ── Render ────────────────────────────────────────────────────────────
    function renderList() {
        const container = document.getElementById('mailList');
        if (!messages.length) {
            container.innerHTML = `
                <div class="p-16 text-center border border-zinc-900 rounded-[2rem] bg-zinc-900/20">
                    <p class="text-zinc-700 text-xs font-bold uppercase tracking-widest">Waiting for TikTok OTP...</p>
                </div>`;
            return;
        }
        container.innerHTML = messages.map((msg, i) => `
            <div onclick="openMessage('${esc(msg._id)}')"
                 class="fade-in bg-zinc-900 border border-zinc-800 p-6 rounded-[1.5rem] hover:border-pink-500/50 transition-all cursor-pointer"
                 style="animation-delay:${i * 40}ms">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-pink-500 font-bold text-[10px] tracking-widest uppercase truncate max-w-[60%]">
                        ${esc(msg.from?.[0]?.address || 'TikTok')}
                    </span>
                    <span class="text-[10px] text-zinc-600 font-mono flex-shrink-0 ml-2">
                        ${new Date(msg.received).toLocaleTimeString()}
                    </span>
                </div>
                <div class="text-white font-bold text-base">${esc(msg.subject)}</div>
                <p class="text-zinc-600 text-[10px] mt-1 uppercase tracking-wider">Tap to read & get OTP →</p>
            </div>`).join('');
    }

    // ── Modal ─────────────────────────────────────────────────────────────
    async function openMessage(id) {
        const msg = messages.find(m => m._id === id);
        if (!msg) return;

        document.getElementById('modalSubject').textContent = msg.subject;
        document.getElementById('modalFrom').textContent    = 'From: ' + (msg.from?.[0]?.address || 'Unknown');
        document.getElementById('modalBody').textContent    = 'Loading...';
        document.getElementById('otpBox').classList.add('hidden');
        showModal();

        const body = await fetchBody(id);
        const text = body || msg.body || '(Empty message)';
        document.getElementById('modalBody').textContent = text;

        const m = text.match(/\b(\d{4,8})\b/);
        if (m) {
            detectedOtp = m[1];
            document.getElementById('otpCode').textContent = detectedOtp;
            document.getElementById('otpBox').classList.remove('hidden');
        } else {
            detectedOtp = '';
        }
    }

    function showModal() {
        const el = document.getElementById('modal');
        el.classList.remove('hidden');
        el.style.display = 'flex';
    }
    function closeModal() {
        const el = document.getElementById('modal');
        el.classList.add('hidden');
        el.style.display = '';
    }
    document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

    // ── Status ────────────────────────────────────────────────────────────
    function setStatus(state) {
        const dot   = document.getElementById('statusDot');
        const label = document.getElementById('connStatus');
        const bar   = document.getElementById('syncBar');
        const map   = {
            connecting:   ['bg-yellow-500', 'Connecting...', false],
            live:         ['bg-green-400 pulse-ring', '● Live — emails appear instantly', true],
            polling:      ['bg-yellow-400', 'Syncing every 5 seconds', true],
            reconnecting: ['bg-orange-400', 'Reconnecting...', false],
        };
        const [cls, txt, showBar] = map[state] || map.connecting;
        dot.innerHTML = `<div class="h-2 w-2 rounded-full ${cls}"></div>`;
        label.textContent = txt;
        bar.style.opacity = showBar ? '1' : '0';
    }

    // ── Clipboard ─────────────────────────────────────────────────────────
    function copyEmail() {
        navigator.clipboard.writeText(currentEmail);
        const el = document.getElementById('emailDisplay');
        const orig = el.textContent;
        el.textContent = '✓ COPIED!';
        setTimeout(() => el.textContent = orig, 1500);
    }
    function copyOtp() {
        if (!detectedOtp) return;
        navigator.clipboard.writeText(detectedOtp);
        const btn = document.querySelector('#otpBox button');
        const orig = btn.textContent;
        btn.textContent = '✓ COPIED!';
        setTimeout(() => btn.textContent = orig, 1500);
    }

    // ── Notifications ─────────────────────────────────────────────────────
    function requestNotification(subject) {
        if (Notification.permission === 'granted') {
            new Notification('📬 New email received!', { body: subject });
        } else if (Notification.permission !== 'denied') {
            Notification.requestPermission().then(p => {
                if (p === 'granted') new Notification('📬 New email received!', { body: subject });
            });
        }
    }

    // ── Escape HTML ───────────────────────────────────────────────────────
    function esc(s) {
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
</body>
</html>
